services:
  api:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
